[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "themis-eval"
version = "4.0.0a0"
description = "Themis v4 Phase 1 foundation"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Pittawat Taveekitworachai" }]
license = "MIT"
keywords = ["llm", "evaluation", "benchmark", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.12.5",
]

[project.urls]
Repository = "https://github.com/Pittawat2542/themis"
Issues = "https://github.com/Pittawat2542/themis/issues"

[tool.setuptools.packages.find]
include = ["themis*"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.5",
    "mypy>=1.14.0",
]

[tool.pytest.ini_options]
addopts = "-q"
pythonpath = ["."]
