[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "themis-eval"
version = "2.0.0"
description = "Lightweight evaluation platform for LLM experiments"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    {name = "Pittawat Taveekitworachai"}
]
license = "MIT"
keywords = ["llm", "evaluation", "benchmark", "experiments", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.12.5",
]

[project.urls]
Homepage = "https://pittawat2542.github.io/themis/"
Repository = "https://github.com/Pittawat2542/themis"
Documentation = "https://pittawat2542.github.io/themis/"
Changelog = "https://github.com/Pittawat2542/themis/blob/main/CHANGELOG.md"
Issues = "https://github.com/Pittawat2542/themis/issues"

[project.scripts]
themis-quickcheck = "themis.cli.quickcheck:main"

[tool.setuptools.packages.find]
include = [
    "themis*",
    "experiments*",
]

[tool.setuptools.package-data]
"themis" = ["py.typed"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0.0",
    "pytest-timeout>=2.3.1",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.5",
    "mypy>=1.14.0",
]
compression = [
    "zstandard>=0.25.0",
]
datasets = [
    "datasets>=2.20.0",
]
extractors = [
    "jsonschema>=4.0.0",
]
providers-openai = [
    "openai>=1.0.0",
]
providers-litellm = [
    "litellm>=1.81.0",
    "tenacity>=9.1.2",
]
providers-vllm = [
    "vllm>=0.6.0",
]
docs = [
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.25.0",
]
stats = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "pandas>=2.0.0",
]
telemetry = [
    "langfuse>=3.0.0",
    "wandb>=0.19.0",
]
all = [
    "themis-eval[compression,datasets,docs,extractors,providers-openai,providers-litellm,providers-vllm,stats,telemetry]",
]

[tool.pytest.ini_options]
addopts = "-q"
pythonpath = ["."]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.mypy]
explicit_package_bases = true
namespace_packages = true

[[tool.mypy.overrides]]
module = [
    "bert_score.*",
    "nltk.*",
    "rouge_score.*",
    "vllm.*",
]
ignore_missing_imports = true

[dependency-groups]
dev = [
    "hypothesis>=6.151.9",
]
