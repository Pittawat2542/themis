      - Advanced Workflows: guides/advanced-workflows.md
      - Write a Dataset Loader: guides/dataset-loaders.md
      - Add a Minimal Plugin Set: guides/plugins.md
      - Attach Telemetry & Observability: guides/telemetry-and-observability.md
      - Author Project Files: guides/project-files.md
      - Resume and Inspect Runs: guides/resume-and-inspect.md
      - Hand Off Generation or Evaluation: guides/external-stage-handoffs.md
      - Evolve an Experiment: guides/evolve-an-experiment.md
      - Scale Execution: guides/scaling-execution.md
      - Compare and Export Results: guides/compare-and-export.md
      - Use the Quickcheck CLI: guides/quickcheck.md

  - API Reference:
      - Overview: api-reference/index.md
      - Root Package: api-reference/root.md
      - Specs: api-reference/specs.md
      - Orchestration: api-reference/orchestration.md
      - Runtime: api-reference/runtime.md
      - Registry: api-reference/registry.md
      - Extractors: api-reference/extractors.md
      - Protocols: api-reference/protocols.md
      - Telemetry: api-reference/telemetry.md
      - Records: api-reference/records.md
