site_name: Themis
site_description: Documentation for the Themis evaluation scaffold for LLM research.
repo_url: https://github.com/Pittawat2542/themis
theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            separate_signature: true
            show_signature_annotations: true
            docstring_style: google
nav:
  - Home: index.md
  - Start Here:
      - Overview: start-here/index.md
      - Installation: start-here/installation.md
      - Choose Your API Layer: start-here/choose-your-api-layer.md
      - Choose Your Storage Backend: start-here/choose-your-storage-backend.md
      - Route By Goal: start-here/route-by-goal.md
      - Troubleshooting: start-here/troubleshooting.md
      - Docs Review Checklist: start-here/docs-review-checklist.md
  - Tutorials:
